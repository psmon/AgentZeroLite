<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Agent Band — M0029</title>
  <link rel="stylesheet" href="agent-band.css" />
</head>
<body>
  <header id="band-header">
    <div class="left">
      <h1>Agent Band <span class="tag">M0029</span></h1>
      <span class="hint" id="band-hint">유튜브 링크 또는 로컬 MP3를 재생하고, ▶ Start(System Loopback)로 악단이 반응합니다.</span>
    </div>
    <div class="right">
      <label class="ctrl">
        <span>Stage</span>
        <select id="stagePicker">
          <option value="concert-hall">Concert Hall</option>
          <option value="garden-pavilion">Garden Pavilion</option>
          <option value="moonlit-castle">Moonlit Castle</option>
          <option value="fifa26">Stadium (FIFA 26)</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Source</span>
        <select id="sourcePicker">
          <option value="SystemLoopback">System Loopback</option>
          <option value="Microphone">Microphone</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Singer</span>
        <select id="singerMode">
          <option value="group">Group (girl-group)</option>
          <option value="solo">Solo (main only)</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Top-K</span>
        <input id="topkInput" type="number" min="1" max="20" value="6" />
      </label>
      <button id="startBtn" class="primary">▶ Start</button>
      <button id="stopBtn" class="ghost" disabled>⏹ Stop</button>
      <span class="status" id="bandStatus">idle</span>
    </div>
  </header>

  <main id="stage-wrap">
    <!-- 무대 상단 — 재생 소스 탭 (YouTube / MP3) + 소스별 컨트롤 (M0029) -->
    <div id="yt-bar">
      <div id="srcTabs">
        <button id="srcYt" class="src-tab active" data-src="yt">▶ YouTube</button>
        <button id="srcMp3" class="src-tab" data-src="mp3">🎵 MP3</button>
      </div>
      <div id="yt-src-controls" class="src-controls">
        <span class="yt-ic">🔗</span>
        <input id="ytUrl" type="text" spellcheck="false"
               placeholder="https://www.youtube.com/watch?v=…  유튜브 링크를 붙여넣기" />
        <button id="ytPaste" class="yt-paste">붙이기</button>
      </div>
      <div id="mp3-src-controls" class="src-controls hidden">
        <span class="yt-ic">🎵</span>
        <span id="mp3Folder" class="mp3-folder" title="">폴더 미설정</span>
        <button id="mp3Pick" class="yt-list-btn" title="MP3 폴더 선택 (하위 폴더 포함)">📁 폴더</button>
        <button id="mp3Scan" class="yt-paste" title="스캔은 백그라운드로 진행 — 스캔된 곡부터 바로 재생 가능">🔍 스캔</button>
        <button id="mp3CancelScan" class="yt-list-btn hidden">✖ 중지</button>
      </div>
      <button id="ytListToggle" class="yt-list-btn" title="재생 목록 열기/닫기">📂 목록</button>
      <span class="yt-meta" id="ytMeta">대기</span>
    </div>

    <!-- 스캔 진행 스트립 (M0029 후속#4) — 가변 길이 진행 텍스트를 버튼 줄에서
         분리해 별도 고정 높이 레이아웃으로. 버튼 위치가 출렁이지 않는다. -->
    <div id="mp3-progress" class="hidden">
      <div id="mp3ProgressFill"></div>
      <span id="mp3ProgressText">—</span>
    </div>

    <!-- 상단 영상 영역 (영상 없으면 접힘) -->
    <div id="yt-top" class="hidden">
      <div id="yt-player">
        <div id="yt-frame-wrap">
          <iframe id="ytFrame" title="YouTube"
                  allow="autoplay; encrypted-media; picture-in-picture"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen></iframe>
          <div class="player-empty" id="ytEmpty">▶ 재생 목록에서 영상을 선택하거나,<br/>위에 유튜브 링크를 붙여넣으세요.</div>
        </div>
        <div id="yt-caption">
          <div class="cap-left">
            <div class="cap-title" id="ytTitle">—</div>
            <div class="cap-channel" id="ytChannel">—</div>
          </div>
          <div class="cap-right">
            <span class="cap-llm" id="ytBy">✦ LLM 분류</span>
            <span class="cap-cat" id="ytCat">—</span>
          </div>
        </div>
      </div>
      <!-- 로컬 MP3 미니 플레이어 (M0029 후속#2) — 커버+메타+재생 컨트롤만.
           목록이 정보의 중심이므로 우측 플레이리스트가 나머지 폭을 가진다. -->
      <div id="mp3-player" class="hidden">
        <div id="mp3-cover-wrap">
          <img id="mp3Cover" class="hidden" alt="" />
          <span id="mp3CoverFb">💿</span>
        </div>
        <div id="mp3-meta">
          <div class="cap-title" id="mp3Title">재생할 곡을 목록에서 선택하세요</div>
          <div class="cap-channel" id="mp3Artist">—</div>
          <div class="mp3-badges">
            <span class="cap-llm" id="mp3By">· 분류</span>
            <span class="cap-cat" id="mp3Cat">—</span>
          </div>
          <div class="mp3-inst" id="mp3NowInst"></div>
        </div>
        <audio id="mp3Audio" controls preload="none"></audio>
      </div>
      <aside id="yt-playlist">
        <div class="pl-head">
          <span class="pl-title" id="plTitle">재생 목록 · 카테고리</span>
          <span class="pl-count" id="plCount">0</span>
        </div>
        <div class="mp3-filter hidden" id="mp3Filter">
          <input id="mp3InstQuery" type="text" spellcheck="false"
                 placeholder="악기 검색 — 예: 피아노, drum" />
          <select id="mp3InstMode" title="포함: 해당 악기가 들어간 곡 / 단독: 그 악기만 있는 곡">
            <option value="has">포함</option>
            <option value="only">단독</option>
          </select>
        </div>
        <div class="pl-tabs" id="plTabs"></div>
        <div class="pl-list" id="plList">
          <span class="pl-empty">아직 추가된 영상이 없습니다</span>
        </div>
      </aside>
    </div>

    <!-- 하단 무대 — 악단/연주단 (시스템 루프백 반응) -->
    <div id="band-region">
      <canvas id="stage"></canvas>
      <div id="overlay">
        <div id="label-strip"><span class="empty">대기 중 …</span></div>
      </div>
    </div>
  </main>

  <footer id="band-footer">
    <div id="spectrum-wrap">
      <canvas id="spectrum"></canvas>
    </div>
    <div id="diag">
      <span id="diag-source">—</span>
      <span id="diag-tick">tick 0</span>
      <span id="diag-infer">— ms</span>
      <span id="diag-mel">— × —</span>
    </div>
  </footer>

  <!-- Bridge JS is shipped with the host (built-in Wasm/common/zero-bridge.js,
       virtual-mapped to https://zero.local/). Load it across the virtual-host
       boundary so user-plugin installs stay zero-copy and always pick up the
       host's current bridge surface (music.*, note.*, tokens.*, …). -->
  <script src="https://zero.local/common/zero-bridge.js"></script>
  <script src="agent-band.js"></script>
</body>
</html>
