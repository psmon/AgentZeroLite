<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentZero Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Gaegu:wght@400;700&display=swap">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/md.css">
</head>
<body>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
  <aside id="sidebar" class="sidebar"></aside>
  <main id="main" class="main">
    <div id="topbar" class="topbar"></div>
    <div id="subbar" class="subbar" hidden></div>
    <section id="view" class="view"></section>
  </main>

  <div id="modal-root" class="modal-root" hidden></div>

  <!-- External libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Import map for Three.js (M0016 Actor World view).
       jsm/* example files use bare `from 'three'` specifiers; without this
       map the browser refuses with "Failed to resolve module specifier 'three'".
       Bumping Three.js means updating both the URL and the matching version
       in js/views/actor-world.js → THREE_VERSION constant. -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- App -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
