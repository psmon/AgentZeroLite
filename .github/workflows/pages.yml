name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # The deploy reads source from Home/ (site shell) AND from harness/ +
    # Docs/ (mirrored into Home/_resources/ at build time). Any of these
    # changing should redeploy.
    paths:
      - 'Home/**'
      - 'harness/**'
      - 'Docs/**'
      - '.github/workflows/pages.yml'

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build harness-view manifests + resource mirror
        # Regenerates Home/harness-view/indexes/*.json AND populates
        # Home/_resources/{Docs,harness} from the live source tree, so
        # the deployed Home/ artifact is self-contained without committing
        # duplicated content. Single source of truth = harness/ + Docs/.
        run: node Home/harness-view/scripts/build-indexes.js

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Create the Pages site on first run if it does not exist yet
          # (requires repo `pages: write` permission, already granted above).
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Home

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
